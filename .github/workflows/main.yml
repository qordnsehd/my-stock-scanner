name: Stock Scanner
on:
  schedule:
    - cron: '0 0 * * 1-5' # 매일 평일 아침에 자동 실행
  workflow_dispatch: # 수동 실행 버튼 생성
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'
      - name: Run Script
        run: python main.py
